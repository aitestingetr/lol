<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.GUI // Lazer Eyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-red: #ff0033; --dark-bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle, rgba(255, 0, 51, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-red);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 15px 30px;
            border-bottom: 2px solid var(--neon-red);
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.3);
        }

        .logo { height: 50px; filter: drop-shadow(0 0 5px var(--neon-red)); }
        .title { font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; }

        .container {
            flex-grow: 1;
            position: relative;
            margin: 20px;
            border: 2px solid var(--neon-red);
            background: #000;
            /* Angular Gaming Cut */
            clip-path: polygon(0 0, 97% 0, 100% 3%, 100% 100%, 3% 100%, 0 97%);
        }

        video, canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .input_video { transform: scaleX(-1); opacity: 0; } /* Hide raw video, Three.js handles it */

        .controls {
            padding: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid rgba(255, 0, 51, 0.3);
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 12px 25px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            clip-path: polygon(0 0, 85% 0, 100% 25%, 100% 100%, 15% 100%, 0 75%);
        }

        button:hover {
            background: var(--neon-red);
            color: #000;
            box-shadow: 0 0 20px var(--neon-red);
        }

        .personal-link, .github-link {
            position: absolute;
            bottom: 10px;
            font-family: 'JetBrains Mono', monospace;
            text-decoration: none;
            color: rgba(255, 0, 51, 0.5);
            font-size: 0.7rem;
        }
        .personal-link { right: 20px; }
        .github-link { left: 20px; }

        /* Hide the annoying GUI helper for a cleaner look */
        .lil-gui { display: none; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="header">
        <img src="./logor.png" alt="[G]" class="logo">
        <h1 class="title">Lazer_Eyes Filter</h1>
    </div>
    
    <div class="container">
        <video class="input_video" playsinline></video>
        <canvas class="output_canvas"></canvas>
        <canvas class="debug_canvas"></canvas>
    </div>

    <div class="controls">
        <button id="laserBtn">Toggle_Lasers [L]</button>
        <button id="captureBtn">Capture [C]</button>
    </div>

    <a href="https://guns.lol/Extreem" class="personal-link">MADE_BY // THE G.GUI_PROJECT</a>

    <script type="module" src="main.js"></script>
</body>
</html>
