<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <title>Timewarp Effect</title>
  </head>
  <body>
    <div class="canvas-area blocked" title="Allow the camera and choose a device to continue">
      <canvas id="canvas"></canvas>
      <canvas id="imageCanvas"></canvas>
    </div>

    <div class="actions">
      <select id="deviceList"></select>
      
      <button id="direction-button" title="Toggle Scan Direction [D]">Scan: Vertical</button>
      
      <button id="reset-button">Reset</button>
      <button id="download-button">Download Image</button>
    </div>

    <script src="./effect.js"></script>
    <script src="./devices.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
