<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>G.GUI — Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
    }

    .download-page {
      height: calc(100% - 60px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      text-align: center;
    }

    .download-title {
      font-size: 42px;
      color: #9ffcff;
      text-shadow: 0 0 30px #00ffff;
    }

    .download-btn {
      padding: 24px 64px;
      font-size: 18px;
      border-radius: 16px;
      border: 2px solid rgba(0,255,255,0.9);
      background: #050505;
      color: #9ffcff;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 20px rgba(0,255,255,0.6);
      transition: 0.25s ease;
    }

    .download-btn:hover {
      box-shadow: 0 0 40px rgba(0,255,255,1);
      transform: translateY(-2px);
    }

    iframe {
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,255,255,0.6);
    }
  </style>
</head>

<div class="custom-cursor" id="cursor"></div>

<script>
  const cursor = document.getElementById("cursor");

  document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  document.addEventListener("mousedown", () => {
    cursor.style.transform = "translate(-50%, -50%) scale(0.7)";
  });

  document.addEventListener("mouseup", () => {
    cursor.style.transform = "translate(-50%, -50%) scale(1)";
  });

  const interactive = document.querySelectorAll("a, button, .nav-card");

  interactive.forEach(el => {
    el.addEventListener("mouseenter", () => {
      cursor.style.width = "28px";
      cursor.style.height = "28px";
      cursor.style.boxShadow = "0 0 20px #00ffff";
    });
    el.addEventListener("mouseleave", () => {
      cursor.style.width = "18px";
      cursor.style.height = "18px";
      cursor.style.boxShadow = "0 0 12px #00ffffaa";
    });
  });
</script>
  
<body>

  <header class="top-bar">
    <div class="top-left">
      <a href="index.html" class="controller-home">
        <img src="assets/img/controller.svg" alt="Home">

      Discord
    </a>
  </header>

  <!-- MAIN CONTENT -->
  <main class="download-page">
    <div class="download-title">G.GUI-UGS Launcher</div>

  <a href="https://1drv.ms/u/c/8cbe5efae23a6d4f/IQARYvlgzgijSZzj8tAZHhMBARtPGxslKN_fTltMjzcDYlw?download=1" class="download-btn">
  Download G.GUI
  </a>


    
    <iframe src="https://www.youtube.com/embed/0qgqJh1MnlY?si=UAsEFBNCV8P_R4cs"
            width="600"
            height="300">
    </iframe>
  </main>

  <footer class="footer">
    <span>G.GUI Project • Launcher</span>
  </footer>

</body>
</html>
